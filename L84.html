        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f6fa;
            color: #2f3640;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .series-container {
            display: flex; 
            align-items: center;
            background: #ffffff;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .series-title {
            margin: 0;
            padding-right: 20px;
            margin-right: 20px;
            border-right: 2px solid #e1e2e6;
            font-size: 1.1rem;
            color: #353b48;
            
           
            width: 100px;         
            flex-shrink: 0;       
            word-break: break-all;
            text-align: center;
        }


        .char-grid {
            display: grid;
            grid-template-columns: repeat(12, 70px); 
            justify-content: space-between;
            flex-grow: 1;
        }

        .char-item {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            object-fit: cover;
            cursor: pointer;
            transition: all 0.2s ease-in-out;
            
            filter: brightness(0.3) grayscale(0.5);
            border: 3px solid transparent;
        }

        .char-item.obtained {
            filter: brightness(1) grayscale(0);
            border: 3px solid #fbc531;
            box-shadow: 0 0 10px rgba(251, 197, 49, 0.5);
        }


        .action-btn {
            background-color: #d5e8f2;
            border: none;
            border-radius: 5px;
            color: #2f3640;
            cursor: pointer;
            font-weight: bold;
            transition: background-color 0.2s;
        }
        .action-btn:hover { background-color: #b8c7cf; }

        .toggle-btn {
            display: block;
            margin: 0 auto 20px auto;
            padding: 10px 20px;
            font-size: 1.1rem;
        }

        .select-all-btn {
            margin-top: 10px;
            padding: 5px 10px;
            font-size: 0.8rem;
            width: 100%;
        }

        .group-details {
            background: #e1e2e6;
            border-radius: 10px;
            padding: 10px 20px;
            margin-bottom: 20px;
        }
        .group-details summary {
            font-size: 1.3rem;
            font-weight: bold;
            cursor: pointer;
            padding: 10px 0;
            color: #2f3640;
            list-style: none;
        }
        .group-details summary::-webkit-details-marker { display: none; }



        @media (max-width: 1050px) {
            .series-container {
                flex-direction: column;
                align-items: flex-start;
            }
            .series-title {
                border-right: none;
                border-bottom: 2px solid #e1e2e6;
                padding-right: 0;
                margin-right: 0;
                padding-bottom: 10px;
                margin-bottom: 15px;
                width: 100%;
                text-align: left;
            }
            .char-grid {
                grid-template-columns: repeat(6, 70px);
                justify-content: start;
                gap: 15px;
            }
        }

 
        @media (max-width: 600px) {
            .char-grid {
                grid-template-columns: repeat(4, 70px);
                gap: 12px;
            }
        }

        const app = document.getElementById('app');
        const toggleBtn = document.getElementById('toggle-view-btn');
        let savedState = JSON.parse(localStorage.getItem('gachaTrackerSave')) || {};
        
        let isGroupedView = false; 

        toggleBtn.addEventListener('click', () => {
            isGroupedView = !isGroupedView;
            toggleBtn.textContent = isGroupedView ? "展開" : "分組";
            renderView(); 
        });

        function createSeriesElement(series) {
            const container = document.createElement('div');
            container.className = 'series-container';

            const titleWrapper = document.createElement('div');
            titleWrapper.className = 'series-title';
            
            const title = document.createElement('h2');
            title.textContent = series.seriesName;
            title.style.margin = "0";
            title.style.fontSize = "1.1rem";
            titleWrapper.appendChild(title);

            const selectAllBtn = document.createElement('button');
            selectAllBtn.className = 'action-btn select-all-btn';
            selectAllBtn.textContent = "全選";
            selectAllBtn.addEventListener('click', () => {
                let allSelected = true;
                for (let i = 0; i < series.images.length; i++) {
                    if (!savedState[`${series.seriesName}-char-${i}`]) allSelected = false;
                }
                
                const newState = !allSelected;
                for (let i = 0; i < series.images.length; i++) {
                    savedState[`${series.seriesName}-char-${i}`] = newState;

                    const imgElement = document.getElementById(`img-${series.seriesName}-${i}`);
                    if (imgElement) {
                        if (newState) {
                            imgElement.classList.add('obtained');
                        } else {
                            imgElement.classList.remove('obtained');
                        }
                    }
                }
                localStorage.setItem('gachaTrackerSave', JSON.stringify(savedState));
            });
            titleWrapper.appendChild(selectAllBtn);
            container.appendChild(titleWrapper);

            const grid = document.createElement('div');
            grid.className = 'char-grid';

            series.images.forEach((imgUrl, index) => {
                const charId = `${series.seriesName}-char-${index}`;
                const img = document.createElement('img');
                img.id = `img-${series.seriesName}-${index}`;
                img.className = 'char-item';
                img.src = imgUrl;

                if (savedState[charId]) {
                    img.classList.add('obtained');
                }

                img.addEventListener('click', () => {
                    img.classList.toggle('obtained');
                    savedState[charId] = img.classList.contains('obtained');
                    localStorage.setItem('gachaTrackerSave', JSON.stringify(savedState));
                });

                grid.appendChild(img);
            });

            container.appendChild(grid);
            return container;
        }


        function renderView() {
            app.innerHTML = ''; 

            if (isGroupedView) {

                let classifiedSeriesNames = []; 


                for (const [groupName, seriesNames] of Object.entries(groupConfig)) {
                    const details = document.createElement('details');
                    details.open = true;
                    details.className = 'group-details';
                    
                    const summary = document.createElement('summary');
                    summary.textContent = `▼ ${groupName}`;
                    details.appendChild(summary);
                    

                    seriesNames.forEach(name => {
                        const series = trackerData.find(d => d.seriesName === name);
                        if (series) {
                            details.appendChild(createSeriesElement(series));
                            classifiedSeriesNames.push(name);
                        }
                    });
                    

                    if (details.children.length > 1) {
                        app.appendChild(details);
                    }
                }


                const unclassifiedSeries = trackerData.filter(d => !classifiedSeriesNames.includes(d.seriesName));
                
                if (unclassifiedSeries.length > 0) {
                    const details = document.createElement('details');
                    details.open = true;
                    details.className = 'group-details';
                    
                    const summary = document.createElement('summary');
                    summary.textContent = `▼ 其他`;
                    details.appendChild(summary);
                    
                    unclassifiedSeries.forEach(series => {
                        details.appendChild(createSeriesElement(series));
                    });
                    
                    app.appendChild(details);
                }

            } else {

                trackerData.forEach(series => {
                    app.appendChild(createSeriesElement(series));
                });
            }
        }
