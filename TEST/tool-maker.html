<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>변변찮은 밀키트</title>
    <link href="https://fonts.googleapis.com/css2?family=Nanum+Gothic&family=Nanum+Myeongjo:wght@700;800&family=Noto+Sans+KR:wght@400;700&family=Noto+Serif+KR:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        @font-face {
            font-family: 'KoPubWorldBatang';
            font-weight: 400;
            font-style: normal;
            src: url('https://fastly.jsdelivr.net/gh/projectnoonnu/noonfonts_six@1.2/KoPubWorldBatangA.woff') format('woff');
        }
        @font-face {
            font-family: 'KoPubWorldBatang';
            font-weight: 700;
            font-style: normal;
            src: url('https://fastly.jsdelivr.net/gh/projectnoonnu/noonfonts_six@1.2/KoPubWorldBatangB.woff') format('woff');
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #eef7fc;
            color: #2c3e50;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 30px;
        }
        
        .main-container {
            display: flex;
            width: 1450px;
            gap: 30px;
            align-items: flex-start;
            margin: 0 auto;
        }
        
        .editor-container {
            width: 400px;
            background-color: #ffffff;
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(180, 215, 235, 0.4);
            border: 1px solid #cbe3f0;
            display: flex;
            flex-direction: column;
            gap: 16px;
            height: 90vh;
            overflow-y: auto;
        }
        
        .editor-container h2 {
            font-size: 1.1rem;
            margin-bottom: 2px;
            border-bottom: 2px solid #b3daf0;
            padding-bottom: 6px;
            color: #1e4d66;
            margin-top: 12px;
        }
        .editor-container h2:first-of-type {
            margin-top: 0;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            width: 100%;
        }
        .form-group label {
            font-size: 0.82rem;
            color: #4f7085;
            font-weight: bold;
        }
        .form-group input, .form-group textarea, .form-group select {
            background-color: #f2f9fd;
            border: 1px solid #cce3f0;
            border-radius: 8px;
            padding: 10px;
            color: #333;
            font-size: 0.9rem;
            outline: none;
            width: 100%;
        }
        .form-group input:focus, .form-group textarea:focus, .form-group select:focus {
            border-color: #6bb1e0;
            background-color: #ffffff;
        }
        .form-group textarea {
            resize: vertical;
            height: 110px;
        }
        .range-val {
            font-size: 0.8rem;
            color: #2b82c9;
            float: right;
        }
        
        .btn-save {
            background-color: #3fa9e5;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 10px;
            position: sticky;
            bottom: 0;
            box-shadow: 0 4px 14px rgba(63, 169, 229, 0.4);
            width: 100%;
        }
        .btn-save:hover {
            background-color: #258ec7;
        }
        
        .radio-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            background: #e1f1fa;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #b8daf0;
        }
        .radio-group label {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            gap: 8px;
            cursor: pointer;
            color: #2b495c;
            font-size: 0.85rem;
            font-weight: bold;
            width: auto;
        }
        .radio-group label input[type="radio"] {
            width: auto;
            margin: 0;
            cursor: pointer;
        }

        .preview-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            position: sticky;
            top: 30px;
        }
        
        #capture-area {
            width: 1000px;
            height: 800px;
            position: relative;
            background-color: #ffffff;
            overflow: hidden;
            box-shadow: 0 12px 45px rgba(160, 195, 215, 0.4);
            flex-shrink: 0;
        }

        .type1-layout {
            display: flex;
            width: 100%;
            height: 100%;
            flex-direction: column;
            background-color: #ffffff;
        }
        .type1-banner-box {
            width: 100%;
            height: 420px;
            background-color: #1a1a1a;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .type1-banner-box img {
            position: absolute;
            width: auto;
            height: auto;
            max-width: none;
            max-height: none;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
        }
        .type1-body-zone {
            flex: 1;
            padding: 40px 50px;
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 40px;
            font-family: 'KoPubWorldBatang', serif;
            overflow: hidden;
        }
        .type1-left-title-col {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .type1-main-title {
            font-size: 28px;
            font-weight: 700;
            line-height: 1.3;
            color: #1a365d;
            word-break: keep-all;
        }
        .type1-copyright {
            position: absolute;
            bottom: 20px;
            right: 30px;
            font-size: 11px;
            color: rgba(255, 255, 255, 0.6);
            font-family: sans-serif;
            z-index: 5;
        }
        .type1-sub-desc {
            font-size: 13px;
            line-height: 1.7;
            color: #444;
            text-align: justify;
            word-break: break-all;
        }
        .type1-right-content-col {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            font-size: 14px;
            line-height: 2.0;
            color: #222;
            height: 100%;
        }
        .type1-right-content-col .content-box {
            text-align: justify;
            text-justify: inter-character;
            word-break: break-all;
            height: 100%;
            overflow: hidden;
        }
        
        .text-paragraph {
            display: block;
            margin-bottom: 12px;
            text-align: justify;
            text-indent: 0; 
        }
        .text-paragraph:empty {
            height: 1em;
            margin-bottom: 12px;
        }
        
        .enable-indent .text-paragraph {
            text-indent: 14px; 
        }

        .type2-layout {
            display: none;
            width: 100%;
            height: 100%;
            position: relative;
        }
        .type2-bg-blur {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover;
            background-position: center;
            transform: scale(1.05);
            z-index: 1;
        }
        .type2-bg-blur::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.3); 
            backdrop-filter: blur(14px); 
        }
        .type2-text-card {
            position: absolute;
            top: 0; left: 100px;
            width: 380px; height: 100%;
            background-color: #ffffff;
            z-index: 3;
            padding: 60px 40px 40px 40px;
            color: #000000;
            display: flex;
            flex-direction: column;
            gap: 30px;
            font-family: 'KoPubWorldBatang', serif; 
        }
        .type2-card-title {
            font-size: 24px;
            font-weight: 700;
            line-height: 1.4;
            word-break: keep-all;
        }
        .type2-card-content {
            font-size: 16px;
            line-height: 1.9; 
            color: #222;
            overflow: hidden;
            text-align: justify; 
            text-justify: inter-character;
            word-break: break-all; 
        }
        .type2-image-box {
            position: absolute;
            top: 180px; right: 120px;
            width: 360px; height: 520px;
            background-color: transparent;
            border: none;
            box-shadow: 0 5px 25px rgba(0,0,0,0.35);
            z-index: 3;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .type2-image-box img {
            position: absolute;
            width: auto;
            height: auto;
            max-width: none;
            max-height: none;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
        }
        .type2-copyright {
            position: absolute;
            bottom: 25px; right: 120px;
            font-size: 11px;
            color: rgba(0, 0, 0, 0.6); 
            z-index: 3;
            font-family: sans-serif;
            letter-spacing: 1px;
            font-weight: bold;
        }

        .type3-layout {
            display: none;
            width: 100%;
            height: 100%;
            flex-direction: column;
            background-color: #ffffff;
        }
        .type3-body-zone {
            flex: 1;
            padding: 50px;
            display: grid;
            grid-template-columns: 295px 20px 1fr;
            gap: 0;
            font-family: 'KoPubWorldBatang', serif;
            height: 100%;
        }
        .type3-left-title-col {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding-right: 35px;
            height: 100%;
        }
        .type3-left-text-area {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 100%;
        }
        .type3-main-title {
            font-size: 28px;
            font-weight: 700;
            line-height: 1.3;
            color: #1a365d;
            word-break: keep-all;
        }
        .type3-sub-desc {
            font-size: 13px;
            line-height: 1.7;
            color: #444;
            text-align: justify;
            word-break: break-all;
        }
        
        .type3-portrait-box {
            width: 100%;
            height: 380px;
            background-color: #f4fafd;
            border: 1px dashed #bde0f2;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            margin-top: 30px;
        }
        .type3-portrait-box.has-img {
            border: none !important;
            background-color: transparent !important;
        }
        .type3-portrait-box img {
            position: absolute;
            width: auto;
            height: auto;
            max-width: none;
            max-height: none;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
        }
        .type3-divider-col {
            display: flex;
            justify-content: center;
            align-items: stretch;
            position: relative;
        }
        .type3-divider-line {
            width: 1px;
            background-color: #333333;
            height: 100%;
        }
        .type3-right-content-col {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            font-size: 14px;
            line-height: 2.0;
            color: #222;
            padding-left: 35px;
            height: 100%;
            overflow: hidden;
        }
        .type3-right-content-col .content-box {
            text-align: justify;
            text-justify: inter-character;
            word-break: break-all;
            height: 100%;
            overflow: hidden;
        }
        .type3-copyright {
            position: absolute;
            bottom: 25px;
            right: 50px;
            font-size: 11px;
            color: rgba(0, 0, 0, 0.6);
            font-family: sans-serif;
            z-index: 5;
            font-weight: bold;
        }

        .type4-layout {
            display: none;
            width: 100%;
            height: 100%;
            grid-template-columns: 1fr 1fr;
            background-color: #ffffff;
            font-family: 'KoPubWorldBatang', serif;
        }
        .type4-left-panel {
            background-color: #4da8da; 
            padding: 60px 50px 40px 50px;
            display: flex;
            flex-direction: column;
            gap: 30px;
            color: #ffffff;
            height: 100%;
            overflow: hidden;
        }
        .type4-left-panel .type4-main-title {
            font-size: 38px;
            font-weight: 800;
            line-height: 1.3;
            color: #ffffff;
            word-break: keep-all;
            flex-shrink: 0;
        }
        .type4-left-panel .type4-left-text-box {
            font-size: 14.5px;
            line-height: 2.0;
            text-align: justify;
            text-justify: inter-character;
            word-break: break-all;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        .type4-right-panel {
            background-color: #ffffff;
            padding: 60px 50px 40px 50px;
            display: flex;
            flex-direction: column;
            gap: 35px;
            color: #222222;
            height: 100%;
            overflow: hidden;
        }
        .type4-mini-frame {
            width: 100%;
            height: 260px;
            background-color: #f5fafd;
            border: 1px dashed #d0e4f2;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .type4-mini-frame.has-img {
            border: none !important;
            background-color: transparent !important;
        }
        .type4-mini-frame img {
            position: absolute;
            width: auto;
            height: auto;
            max-width: none;
            max-height: none;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
        }
        .type4-right-text-box {
            font-size: 14.5px;
            line-height: 2.0;
            text-align: justify;
            text-justify: inter-character;
            word-break: break-all;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        .type4-copyright {
            position: absolute;
            bottom: 25px;
            right: 50px;
            font-size: 11px;
            color: rgba(0, 0, 0, 0.4);
            font-family: sans-serif;
            z-index: 5;
            font-weight: bold;
        }

        .img-guide-placeholder {
            color: #7ba2b8;
            font-size: 0.85rem;
            border: 2px dashed #a3d2ed;
            padding: 15px;
            border-radius: 8px;
            z-index: 2;
            background: rgba(255, 255, 255, 0.1);
            text-align: center;
        }

        .sd-sticker-container {
            position: absolute;
            width: 150px;
            height: 150px;
            pointer-events: none;
            z-index: 10;
            display: none;
        }
        .sd-sticker-container img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .img-input-row {
            display: flex;
            align-items: center;
            gap: 8px;
            width: 100%;
        }
        .img-input-row input[type="file"] {
            flex: 1;
            min-width: 0;
        }
        .btn-img-clear {
            background-color: #e1f0fa;
            color: #4a7596;
            border: 1px solid #b9daf2;
            border-radius: 8px;
            width: 42px;
            height: 42px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            flex-shrink: 0;
        }
        .btn-img-clear:hover {
            background-color: #cfe3f5;
            color: #2b5574;
            border-color: #9ac4e6;
        }
        .btn-img-clear svg {
            width: 18px;
            height: 18px;
            fill: currentColor;
        }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="editor-container">
            <h2>TYPE</h2>
            <div class="form-group">
                <div class="radio-group">
                    <label><input type="radio" name="layout-type" value="type1" checked> 레이아웃 1</label>
                    <label><input type="radio" name="layout-type" value="type2"> 레이아웃 2</label>
                    <label><input type="radio" name="layout-type" value="type3"> 레이아웃 3</label>
                    <label><input type="radio" name="layout-type" value="type4"> 레이아웃 4</label>
                </div>
            </div>

            <h2>INDENT</h2>
            <div class="form-group" style="flex-direction:row; align-items:center; gap:10px; background:#e8f4fd; padding:12px; border-radius:8px; border:1px solid #badcf7;">
                <input type="checkbox" id="check-indent-toggle" style="width:18px; height:18px; cursor:pointer;">
                <label for="check-indent-toggle" style="margin:0; cursor:pointer; color:#1e4d66; font-size:0.88rem;">문단 들여쓰기</label>
            </div>

            <h2>CONTEXT</h2>
            <div class="form-group">
                <label for="input-title">제목</label>
                <input type="text" id="input-title" value="제목을 입력하세요">
            </div>
            
            <div class="form-group" id="group-type1-sub">
                <label for="input-sub-desc">요약</label>
                <textarea id="input-sub-desc" style="height: 65px;">내용을 입력하세요</textarea>
            </div>

            <div class="form-group" id="group-text-type1-left">
                <label for="input-text-type1-left">본문 1</label>
                <textarea id="input-text-type1-left">내용을 입력하세요</textarea>
            </div>

            <div class="form-group" id="group-text-type1-right">
                <label for="input-text-type1-right">본문 2</label>
                <textarea id="input-text-type1-right">내용을 입력하세요</textarea>
            </div>

            <div class="form-group" id="group-text-type2" style="display: none;">
                <label for="input-text-type2">본문</label>
                <textarea id="input-text-type2">내용을 입력하세요</textarea>
            </div>

            <div class="form-group" id="group-text-left" style="display: none;">
                <label for="input-text-left">본문 1</label>
                <textarea id="input-text-left">내용을 입력하세요</textarea>
            </div>

            <div class="form-group" id="group-text-right" style="display: none;">
                <label for="input-text-right">본문 2</label>
                <textarea id="input-text-right">내용을 입력하세요</textarea>
            </div>

            <div class="form-group">
                <label for="select-font">FONT</label>
                <select id="select-font">
                    <option value="'KoPubWorldBatang', serif">KoPub 바탕체</option>
                    <option value="'Noto Serif KR', serif">Noto Serif KR</option>
                    <option value="'Nanum Myeongjo', serif">나눔명조</option>
                    <option value="'Noto Sans KR', sans-serif">Noto Sans KR</option>
                    <option value="'Nanum Gothic', sans-serif">나눔고딕</option>
                </select>
            </div>

            <div class="form-group" id="group-title-color">
                <label for="input-title-color">제목 색상</label>
                <input type="color" id="input-title-color" value="#1a365d">
            </div>

            <div class="form-group" id="group-divider-color" style="display: none;">
                <label for="input-divider-color">구분선 색상</label>
                <input type="color" id="input-divider-color" value="#333333">
            </div>

            <div class="form-group" id="group-t4-bg" style="display: none;">
                <label for="input-t4-bg-color">(좌) 배경 색상</label>
                <input type="color" id="input-t4-bg-color" value="#4da8da">
            </div>
            
            <div class="form-group" id="group-main-img">
                <label id="img-label-node">페어 이미지</label>
                <div class="img-input-row">
                    <input type="file" id="input-image" accept="image/*">
                    <button class="btn-img-clear" onclick="clearMainImage()" title="이미지 삭제">
                        <svg viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
                    </button>
                </div>
            </div>

            <h2>IMAGE</h2>
            <div class="form-group">
                <label>크기 조절 <span class="range-val" id="val-zoom">100%</span></label>
                <input type="range" id="range-zoom" min="30" max="300" value="100">
            </div>
            <div class="form-group">
                <label>좌우 위치 조절 <span class="range-val" id="val-x">0px</span></label>
                <input type="range" id="range-x" min="-400" max="400" value="0">
            </div>
            <div class="form-group">
                <label>상하 위치 조절 <span class="range-val" id="val-y">0px</span></label>
                <input type="range" id="range-x-y" min="-400" max="400" value="0">
            </div>

            <h2>SD</h2>
            <div class="form-group">
                <label>SD 이미지</label>
                <div class="img-input-row">
                    <input type="file" id="input-sd-image" accept="image/*">
                    <button class="btn-img-clear" onclick="clearSdImage()" title="SD 삭제">
                        <svg viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
                    </button>
                </div>
            </div>
            <div class="form-group">
                <label>SD 크기 배율 <span class="range-val" id="val-sd-zoom">100%</span></label>
                <input type="range" id="range-sd-zoom" min="30" max="250" value="100">
            </div>
            <div class="form-group">
                <label>좌우 위치 조절 <span class="range-val" id="val-sd-x">500px</span></label>
                <input type="range" id="range-sd-x" min="-100" max="1000" value="500">
            </div>
            <div class="form-group">
                <label>상하 위치 조절 <span class="range-val" id="val-sd-y">600px</span></label>
                <input type="range" id="range-sd-y" min="-100" max="800" value="600">
            </div>
            <div class="form-group">
                <label>회전 <span class="range-val" id="val-sd-rotate">0°</span></label>
                <input type="range" id="range-sd-rotate" min="-180" max="180" value="0">
            </div>
            <div class="form-group" style="flex-direction:row; align-items:center; gap:10px; margin-top:5px;">
                <label style="margin:0;">좌우 반전</label>
                <input type="checkbox" id="check-sd-flip" style="width:18px; height:18px; cursor:pointer;">
            </div>

            <h2>COPYRIGHT</h2>
            <div class="form-group">
                <label for="input-copy">출처</label>
                <input type="text" id="input-copy" value="변변찮은 창조주" placeholder="공란일 시 숨김 처리">
            </div>
            
            <button class="btn-save" onclick="saveAsImage()">이미지 다운로드</button>
        </div>

        <div class="preview-container">
            <div id="capture-area">
                
                <div class="type1-layout" id="view-type1">
                    <div class="type1-banner-box" id="view-type1-banner">
                        <span class="img-guide-placeholder" id="placeholder-t1">이미지를 첨부하세요</span>
                        <img id="img-t1" src="" alt="배너형 일러스트" style="display:none;">
                        <div class="type1-copyright" id="copy-t1">© 변변찮은 창조주</div>
                    </div>
                    <div class="type1-body-zone">
                        <div class="type1-left-title-col">
                            <div class="type1-main-title" id="title-t1">제목을 입력하세요</div>
                            <div class="type1-sub-desc" id="sub-desc-t1">보조 단락 영역</div>
                        </div>
                        <div class="type1-right-content-col">
                            <div class="content-box" id="content-t1-left"></div>
                            <div class="content-box" id="content-t1-right"></div>
                        </div>
                    </div>
                </div>

                <div class="type2-layout" id="view-type2">
                    <div class="type2-bg-blur" id="view-type2-bg"></div>
                    <div class="type2-text-card" id="text-card-zone-t2">
                        <div class="type2-card-title" id="title-t2">제목을 입력하세요</div>
                        <div class="type2-card-content" id="content-t2"></div>
                    </div>
                    <div class="type2-image-box" id="view-type2-imagebox">
                        <span class="img-guide-placeholder" id="placeholder-t2">이미지를 첨부하세요</span>
                        <img id="img-t2" src="" alt="페어 이미지" style="display:none;">
                    </div>
                    <div class="type2-copyright" id="copy-t2">© 변변찮은 창조주</div>
                </div>

                <div class="type3-layout" id="view-type3">
                    <div class="type3-body-zone">
                        <div class="type3-left-title-col">
                            <div class="type3-left-text-area">
                                <div class="type3-main-title" id="title-t3">제목을 입력하세요</div>
                                <div class="type3-sub-desc" id="sub-desc-t3">보조 단락 영역</div>
                            </div>
                            
                            <!-- 🛠️ 3번 형태 테두리 연동용 ID 노드 설정 -->
                            <div class="type3-portrait-box" id="out-type3-portraitbox">
                                <span class="img-guide-placeholder" id="placeholder-t3">페어 이미지<br>첨부</span>
                                <img id="img-t3" src="" alt="페어 이미지" style="display:none;">
                            </div>
                        </div>
                        <div class="type3-divider-col">
                            <div class="type3-divider-line" id="out-divider"></div>
                        </div>
                        <div class="type3-right-content-col">
                            <div class="content-box" id="content-t3-left"></div>
                            <div class="content-box" id="content-t3-right"></div>
                        </div>
                    </div>
                    <div class="type3-copyright" id="copy-t3">© 변변찮은 창조주</div>
                </div>

                <div class="type4-layout" id="view-type4">
                    <div class="type4-left-panel" id="panel-t4-left-node">
                        <div class="type4-main-title" id="title-t4">제목을 입력하세요</div>
                        <div class="type4-left-text-box" id="content-t4-left"></div>
                    </div>
                    <div class="type4-right-panel">
                        <div class="type4-mini-frame" id="view-type4-imagebox">
                            <span class="img-guide-placeholder" id="placeholder-t4">이미지를 첨부하세요</span>
                            <img id="img-t4" src="" alt="페어 이미지" style="display:none;">
                        </div>
                        <div class="type4-right-text-box" id="content-t4-right"></div>
                    </div>
                    <div class="type4-copyright" id="copy-t4">© 변변찮은 창조주</div>
                </div>

                <div class="sd-sticker-container" id="out-sd-container">
                    <img id="view-sd-element" src="" alt="SD">
                </div>

            </div>
        </div>
    </div>

    <script>
        const inputTitle = document.getElementById('input-title');
        const inputSubDesc = document.getElementById('input-sub-desc');
        
        const inputTextType1Left = document.getElementById('input-text-type1-left');
        const inputTextType1Right = document.getElementById('input-text-type1-right');
        const inputTextType2 = document.getElementById('input-text-type2');
        
        const inputTextLeft = document.getElementById('input-text-left');
        const inputTextRight = document.getElementById('input-text-right');
        const selectFont = document.getElementById('select-font');
        const inputTitleColor = document.getElementById('input-title-color');
        const inputDividerColor = document.getElementById('input-divider-color');
        const inputT4BgColor = document.getElementById('input-t4-bg-color');
        const inputImage = document.getElementById('input-image');
        const inputCopy = document.getElementById('input-copy');

        const checkIndentToggle = document.getElementById('check-indent-toggle');
        const captureArea = document.getElementById('capture-area');

        const rangeZoom = document.getElementById('range-zoom');
        const rangeX = document.getElementById('range-x');
        const rangeY = document.getElementById('range-x-y');
        const valZoom = document.getElementById('val-zoom');
        const valX = document.getElementById('val-x');
        const valY = document.getElementById('val-y');

        const inputSdImg = document.getElementById('input-sd-image');
        const viewSdElement = document.getElementById('view-sd-element');
        const outSdContainer = document.getElementById('out-sd-container');
        const rangeSdZoom = document.getElementById('range-sd-zoom');
        const rangeSdX = document.getElementById('range-sd-x');
        const rangeSdY = document.getElementById('range-sd-y');
        const rangeSdRotate = document.getElementById('range-sd-rotate');
        const checkSdFlip = document.getElementById('check-sd-flip');

        const valSdZoom = document.getElementById('val-sd-zoom');
        const valSdX = document.getElementById('val-sd-x');
        const valSdY = document.getElementById('val-sd-y');
        const valSdRotate = document.getElementById('val-sd-rotate');

        const viewType1 = document.getElementById('view-type1');
        const viewType2 = document.getElementById('view-type2');
        const viewType3 = document.getElementById('view-type3');
        const viewType4 = document.getElementById('view-type4');
        
        const titleT1 = document.getElementById('title-t1');
        const titleT2 = document.getElementById('title-t2');
        const titleT3 = document.getElementById('title-t3');
        const titleT4 = document.getElementById('title-t4');
        
        const subDescT1 = document.getElementById('sub-desc-t1');
        const subDescT3 = document.getElementById('sub-desc-t3');
        
        const contentT1Left = document.getElementById('content-t1-left');
        const contentT1Right = document.getElementById('content-t1-right');
        const contentT2 = document.getElementById('content-t2');
        const contentT3Left = document.getElementById('content-t3-left');
        const contentT3Right = document.getElementById('content-t3-right');
        const contentT4Left = document.getElementById('content-t4-left');
        const contentT4Right = document.getElementById('content-t4-right');
        
        const outDivider = document.getElementById('out-divider');
        const panelT4LeftNode = document.getElementById('panel-t4-left-node');
        const imgT1 = document.getElementById('img-t1');
        const imgT2 = document.getElementById('img-t2');
        const imgT3 = document.getElementById('img-t3');
        const imgT4 = document.getElementById('img-t4');
        const viewType2Bg = document.getElementById('view-type2-bg');
        const copyT1 = document.getElementById('copy-t1');
        const copyT2 = document.getElementById('copy-t2');
        const copyT3 = document.getElementById('copy-t3');
        const copyT4 = document.getElementById('copy-t4');
        const placeholderT1 = document.getElementById('placeholder-t1');
        const placeholderT2 = document.getElementById('placeholder-t2');
        const placeholderT3 = document.getElementById('placeholder-t3');
        const placeholderT4 = document.getElementById('placeholder-t4');
        const textCardZoneT2 = document.getElementById('text-card-zone-t2');
        
        // 🛠️ 3번 형태 이미지 박스 엘리먼트 추적 변수 추가
        const outType3Portraitbox = document.getElementById('out-type3-portraitbox');
        const viewType4Imagebox = document.getElementById('view-type4-imagebox');

        let curZoom = 1; let curX = 0; let curY = 0;
        let sdZoom = 1; let sdX = 500; let sdY = 600; let sdRotate = 0; let sdFlip = 1;
        let selectedLayout = 'type1';

        document.querySelectorAll('input[name="layout-type"]').forEach(radio => {
            radio.addEventListener('change', (e) => {
                selectedLayout = e.target.value;
                document.getElementById('group-type1-sub').style.display = (selectedLayout === 'type2' || selectedLayout === 'type4') ? 'none' : 'flex';
                
                document.getElementById('group-text-type1-left').style.display = (selectedLayout === 'type1') ? 'flex' : 'none';
                document.getElementById('group-text-type1-right').style.display = (selectedLayout === 'type1') ? 'flex' : 'none';
                document.getElementById('group-text-type2').style.display = (selectedLayout === 'type2') ? 'flex' : 'none';
                
                document.getElementById('group-text-left').style.display = (selectedLayout === 'type3' || selectedLayout === 'type4') ? 'flex' : 'none';
                document.getElementById('group-text-right').style.display = (selectedLayout === 'type3' || selectedLayout === 'type4') ? 'flex' : 'none';
                document.getElementById('group-title-color').style.display = (selectedLayout === 'type1' || selectedLayout === 'type3') ? 'flex' : 'none';
                document.getElementById('group-divider-color').style.display = (selectedLayout === 'type3') ? 'flex' : 'none';
                document.getElementById('group-t4-bg').style.display = (selectedLayout === 'type4') ? 'flex' : 'none';
                
                if(selectedLayout === 'type1') {
                    viewType1.style.display = 'flex'; viewType2.style.display = 'none'; viewType3.style.display = 'none'; viewType4.style.display = 'none';
                } else if(selectedLayout === 'type2') {
                    viewType1.style.display = 'none'; viewType2.style.display = 'block'; viewType3.style.display = 'none'; viewType4.style.display = 'none';
                } else if(selectedLayout === 'type3') {
                    viewType1.style.display = 'none'; viewType2.style.display = 'none'; viewType3.style.display = 'flex'; viewType4.style.display = 'none';
                } else {
                    viewType1.style.display = 'none'; viewType2.style.display = 'none'; viewType3.style.display = 'none'; viewType4.style.display = 'grid';
                }
            });
        });

        function renderType1Left() {
            const lines = inputTextType1Left.value.split('\n');
            let htmlResult = '';
            lines.forEach(line => { htmlResult += `<span class="text-paragraph">${line}</span>`; });
            contentT1Left.innerHTML = htmlResult;
        }

        function renderType1Right() {
            const lines = inputTextType1Right.value.split('\n');
            let htmlResult = '';
            lines.forEach(line => { htmlResult += `<span class="text-paragraph">${line}</span>`; });
            contentT1Right.innerHTML = htmlResult;
        }

        function renderType2Content() {
            const lines = inputTextType2.value.split('\n');
            let htmlResult = '';
            lines.forEach(line => { htmlResult += `<span class="text-paragraph">${line}</span>`; });
            contentT2.innerHTML = htmlResult;
        }

        function renderLeftContent() {
            const lines = inputTextLeft.value.split('\n');
            let htmlResult = '';
            lines.forEach(line => { htmlResult += `<span class="text-paragraph">${line}</span>`; });
            contentT3Left.innerHTML = htmlResult; 
            contentT4Left.innerHTML = htmlResult;
        }

        function renderRightContent() {
            const lines = inputTextRight.value.split('\n');
            let htmlResult = '';
            lines.forEach(line => { htmlResult += `<span class="text-paragraph">${line}</span>`; });
            contentT3Right.innerHTML = htmlResult; 
            contentT4Right.innerHTML = htmlResult;
        }

        checkIndentToggle.addEventListener('change', (e) => {
            if (e.target.checked) {
                captureArea.classList.add('enable-indent');
            } else {
                captureArea.classList.remove('enable-indent');
            }
        });

        inputTitle.addEventListener('input', () => {
            titleT1.textContent = inputTitle.value; titleT2.textContent = inputTitle.value; titleT3.textContent = inputTitle.value; titleT4.textContent = inputTitle.value;
        });
        inputSubDesc.addEventListener('input', () => {
            subDescT1.textContent = inputSubDesc.value; subDescT3.textContent = inputSubDesc.value;
        });
        
        inputTextType1Left.addEventListener('input', renderType1Left);
        inputTextType1Right.addEventListener('input', renderType1Right);
        inputTextType2.addEventListener('input', renderType2Content);
        
        inputTextLeft.addEventListener('input', renderLeftContent);
        inputTextRight.addEventListener('input', renderRightContent);
        
        inputTitleColor.addEventListener('input', (e) => { titleT1.style.color = e.target.value; titleT3.style.color = e.target.value; });
        inputDividerColor.addEventListener('input', (e) => { outDivider.style.backgroundColor = e.target.value; });
        inputT4BgColor.addEventListener('input', (e) => { panelT4LeftNode.style.backgroundColor = e.target.value; });

        inputCopy.addEventListener('input', () => {
            const val = inputCopy.value.trim();
            if (val === '') {
                copyT1.textContent = ''; copyT2.textContent = ''; copyT3.textContent = ''; copyT4.textContent = '';
            } else {
                copyT1.textContent = '© ' + val; copyT2.textContent = '© ' + val; copyT3.textContent = '© ' + val; copyT4.textContent = '© ' + val;
            }
        });

        selectFont.addEventListener('change', () => {
            const f = selectFont.value;
            titleT1.style.fontFamily = f; titleT2.style.fontFamily = f; titleT3.style.fontFamily = f; titleT4.style.fontFamily = f;
            subDescT1.style.fontFamily = f; subDescT3.style.fontFamily = f;
            contentT1Left.style.fontFamily = f; contentT1Right.style.fontFamily = f; contentT2.style.fontFamily = f;
            contentT3Left.style.fontFamily = f; contentT3Right.style.fontFamily = f;
            contentT4Left.style.fontFamily = f; contentT4Right.style.fontFamily = f;
            textCardZoneT2.style.fontFamily = f;
        });

        function updateMainImageTransforms() {
            const transformRule = `translate(calc(-50% + ${curX}px), calc(-50% + ${curY}px)) scale(${curZoom})`;
            imgT1.style.transform = transformRule; imgT2.style.transform = transformRule; imgT3.style.transform = transformRule; imgT4.style.transform = transformRule;
        }

        rangeZoom.addEventListener('input', () => { curZoom = rangeZoom.value / 100; valZoom.textContent = rangeZoom.value + '%'; updateMainImageTransforms(); });
        rangeX.addEventListener('input', () => { curX = rangeX.value; valX.textContent = rangeX.value + 'px'; updateMainImageTransforms(); });
        rangeY.addEventListener('input', () => { curY = rangeY.value; valY.textContent = rangeY.value + 'px'; updateMainImageTransforms(); });

        inputImage.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    placeholderT1.style.display = 'none'; placeholderT2.style.display = 'none'; placeholderT3.style.display = 'none'; placeholderT4.style.display = 'none';
                    imgT1.style.display = 'block'; imgT2.style.display = 'block'; imgT3.style.display = 'block'; imgT4.style.display = 'block';
                    imgT1.src = event.target.result; imgT2.src = event.target.result; imgT3.src = event.target.result; imgT4.src = event.target.result;
                    
                    // 🛠️ 3번 형태와 4번 형태 가이드 테두리 유동적 실시간 상쇄 연동 추가
                    outType3Portraitbox.classList.add('has-img');
                    viewType4Imagebox.classList.add('has-img');
                    
                    viewType2Bg.style.backgroundImage = `url('${event.target.result}')`;
                    curZoom = 1; curX = 0; curY = 0;
                    rangeZoom.value = 100; rangeX.value = 0; rangeY.value = 0;
                    valZoom.textContent = '100%'; valX.textContent = '0px'; valY.textContent = '0px';
                    updateMainImageTransforms();
                }
                reader.readAsDataURL(file);
            }
        });

        function clearMainImage() {
            inputImage.value = ''; 
            imgT1.src = ''; imgT2.src = ''; imgT3.src = ''; imgT4.src = '';
            imgT1.style.display = 'none'; imgT2.style.display = 'none'; imgT3.style.display = 'none'; imgT4.style.display = 'none';
            
            // 🛠️ 삭제 시 3번 형태와 4번 형태 내부 테두리 복구
            outType3Portraitbox.classList.remove('has-img');
            viewType4Imagebox.classList.remove('has-img');
            
            viewType2Bg.style.backgroundImage = 'none';
            placeholderT1.style.display = 'block'; placeholderT2.style.display = 'block'; placeholderT3.style.display = 'block'; placeholderT4.style.display = 'block';
            
            curZoom = 1; curX = 0; curY = 0;
            rangeZoom.value = 100; rangeX.value = 0; rangeY.value = 0;
            valZoom.textContent = '100%'; valX.textContent = '0px'; valY.textContent = '0px';
            updateMainImageTransforms();
        }

        function updateSdStickerTransforms() {
            outSdContainer.style.left = sdX + 'px'; outSdContainer.style.top = sdY + 'px';
            outSdContainer.style.width = (150 * sdZoom) + 'px'; outSdContainer.style.height = (150 * sdZoom) + 'px';
            viewSdElement.style.transform = `scaleX(${sdFlip}) rotate(${sdRotate}deg)`;
        }

        inputSdImg.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if(file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    viewSdElement.src = event.target.result; outSdContainer.style.display = 'block';
                    updateSdStickerTransforms();
                };
                reader.readAsDataURL(file);
            }
        });

        function clearSdImage() {
            inputSdImg.value = '';
            viewSdElement.src = '';
            outSdContainer.style.display = 'none';
            
            sdZoom = 1; sdX = 500; sdY = 600; sdRotate = 0; sdFlip = 1;
            rangeSdZoom.value = 100; rangeSdX.value = 500; rangeSdY.value = 600; rangeSdRotate.value = 0;
            checkSdFlip.checked = false;
            valSdZoom.textContent = '100%'; valSdX.textContent = '500px'; valSdY.textContent = '600px'; valSdRotate.textContent = '0°';
        }

        rangeSdZoom.addEventListener('input', (e) => { sdZoom = e.target.value / 100; valSdZoom.textContent = e.target.value + '%'; updateSdStickerTransforms(); });
        rangeSdX.addEventListener('input', (e) => { sdX = parseInt(e.target.value); valSdX.textContent = e.target.value + 'px'; updateSdStickerTransforms(); });
        rangeSdY.addEventListener('input', (e) => { sdY = parseInt(e.target.value); valSdY.textContent = e.target.value + 'px'; updateSdStickerTransforms(); });
        rangeSdRotate.addEventListener('input', (e) => { sdRotate = e.target.value; valSdRotate.textContent = e.target.value + '°'; updateSdStickerTransforms(); });
        checkSdFlip.addEventListener('change', (e) => { sdFlip = e.target.checked ? -1 : 1; updateSdStickerTransforms(); });

        renderType1Left(); renderType1Right(); renderType2Content(); renderLeftContent(); renderRightContent();

        function saveAsImage() {
            const captureArea = document.getElementById('capture-area');
            
            const rawTitle = inputTitle.value.trim();
            const fileName = (rawTitle === '' || rawTitle === '제목을 입력하세요') ? 'chanjo-tool' : rawTitle;
            
            html2canvas(captureArea, {
                useCORS: true, scale: 2, logging: false
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = fileName + '.png'; 
                link.href = canvas.toDataURL('image/png'); 
                link.click();
            }).catch(err => {
                alert('image compile error.'); console.error(err);
            });
        }
    </script>
</body>
</html>
