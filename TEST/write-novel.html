<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>찬조 글로그 틀</title>
    <link href="https://fonts.googleapis.com/css2?family=Nanum+Gothic&family=Nanum+Myeongjo:wght@700;800&family=Noto+Sans+KR:wght@400;700&family=Noto+Serif+KR:wght@400;700&display=swap" rel="stylesheet">
    <style>
        @font-face {
            font-family: 'KoPubWorldBatang';
            font-weight: 400;
            font-style: normal;
            src: url('https://fastly.jsdelivr.net/gh/projectnoonnu/noonfonts_six@1.2/KoPubWorldBatangA.woff') format('woff');
        }
        @font-face {
            font-family: 'KoPubWorldBatang';
            font-weight: 700;
            font-style: normal;
            src: url('https://fastly.jsdelivr.net/gh/projectnoonnu/noonfonts_six@1.2/KoPubWorldBatangB.woff') format('woff');
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #1e1e1e;
            color: #ffffff;
            display: flex;
            flex-wrap: wrap;
            min-height: 100vh;
            padding: 20px;
            gap: 30px;
            justify-content: center;
        }
        .editor-container {
            width: 400px;
            background-color: #2d2d2d;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            gap: 15px;
            height: fit-content;
        }
        .editor-container h2 {
            font-size: 1.2rem;
            margin-bottom: 10px;
            border-bottom: 2px solid #444;
            padding-bottom: 8px;
            color: #ddd;
        }
        .section-divider {
            border-top: 1px solid #444;
            margin-top: 10px;
            padding-top: 10px;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .form-group label {
            font-size: 0.85rem;
            color: #aaa;
            font-weight: bold;
        }
        .form-group input, .form-group textarea, .form-group select {
            background-color: #1a1a1a;
            border: 1px solid #444;
            border-radius: 6px;
            padding: 10px;
            color: #fff;
            font-size: 0.9rem;
            outline: none;
        }
        .form-group textarea {
            resize: vertical;
            height: 180px;
        }
        .range-val {
            font-size: 0.8rem;
            color: #4a6fa5;
            float: right;
        }
        .btn-save {
            background-color: #4a6fa5;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 10px;
        }
        .btn-save:hover {
            background-color: #3b5984;
        }

        .preview-container {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            overflow-x: auto;
        }
        #capture-area {
            width: 1000px;
            height: 800px;
            position: relative;
            background-color: #1a1a1a;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            flex-shrink: 0;
        }
        
        .bg-blur-box {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            z-index: 1;
            display: none;
        }

        .bg-blur-box::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.45); 
        }

        .text-card {
            position: absolute;
            top: 0;
            left: 80px;
            width: 480px;
            height: 100%;
            background-color: #ffffff;
            z-index: 3;
            padding: 80px 60px 60px 60px;
            color: #000000;
            display: flex;
            flex-direction: column;
            gap: 35px;
            font-family: 'KoPubWorldBatang', serif; 
        }
        
        .card-title {
            font-size: 32px;
            font-weight: 700;
            line-height: 1.4;
            word-break: keep-all;
        }
        
        .card-content {
            font-size: 20px;
            line-height: 1.8; 
            color: #222;
            overflow: hidden;
            text-align: justify; 
            text-justify: inter-character;
            word-break: break-all; 
        }

        .card-content .text-line {
            display: block;
            text-align: justify;
            margin-bottom: 0px; 
            min-height: 1.8em;
        }

        .main-image-box {
            position: absolute;
            top: 140px;
            right: 40px; 
            width: 360px;
            height: 520px;
            background-color: #222; 
            border: none; 
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.7);
            z-index: 5;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .main-image-box .no-img-msg {
            color: #777;
            font-size: 0.9rem;
            border: 1px dashed #444;
            padding: 20px;
            border-radius: 8px;
        }
        
        .main-image-box img {
            position: absolute;
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(1); 
            display: none;
        }

        .sticker-box {
            position: absolute;
            bottom: 120px;
            right: 260px;
            width: 150px; 
            height: 150px;
            z-index: 6; 
            display: none; 
            pointer-events: none; 
        }

        .sticker-box img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            transform: translate(0px, 0px) scale(1);
        }
        
        .copyright-tag {
            position: absolute;
            bottom: 25px;
            right: 40px;
            font-size: 11px;
            color: rgba(255, 255, 255, 0.8); 
            z-index: 4;
            font-family: sans-serif;
            letter-spacing: 1px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="editor-container">
        <h2>본문 입력</h2>
        
        <div class="form-group">
            <label for="input-title">제목</label>
            <input type="text" id="input-title" value="제목">
        </div>
        
        <div class="form-group">
            <label for="input-text">본문</label>
            <textarea id="input-text">본문</textarea>
        </div>

        <div class="form-group">
            <label for="select-font">폰트</label>
            <select id="select-font">
                <option value="'KoPubWorldBatang', serif">KoPub 바탕체</option>
                <option value="'Noto Serif KR', serif">Noto Serif KR</option>
                <option value="'Nanum Myeongjo', serif">나눔명조</option>
                <option value="'Noto Sans KR', sans-serif">Noto Sans KR</option>
                <option value="'Nanum Gothic', sans-serif">나눔고딕</option>
            </select>
        </div>
        
        <div class="form-group section-divider">
            <label>1. 메인 그림 첨부</label>
            <input type="file" id="input-image" accept="image/*">
        </div>

        <div class="form-group">
            <label>메인 그림 크기 <span class="range-val" id="val-zoom">100%</span></label>
            <input type="range" id="range-zoom" min="50" max="300" value="100">
        </div>

        <div class="form-group">
            <label>메인 그림 좌우 이동 <span class="range-val" id="val-x">0px</span></label>
            <input type="range" id="range-x" min="-400" max="400" value="0">
        </div>
        <div class="form-group">
            <label>메인 그림 상하 이동 <span class="range-val" id="val-y">0px</span></label>
            <input type="range" id="range-x-y" min="-400" max="400" value="0">
        </div>

        <div class="form-group section-divider">
            <label style="color: #4a6fa5;">2. SD (선택)</label>
            <input type="file" id="input-sticker" accept="image/*">
        </div>

        <div class="form-group">
            <label>SD 크기 조절 <span class="range-val" id="val-stk-zoom">100%</span></label>
            <input type="range" id="range-stk-zoom" min="20" max="250" value="100">
        </div>

        <div class="form-group">
            <label>SD 좌우 위치 <span class="range-val" id="val-stk-x">0px</span></label>
            <input type="range" id="range-stk-x" min="-500" max="500" value="0">
        </div>

        <div class="form-group">
            <label>SD 상하 위치 <span class="range-val" id="val-stk-y">0px</span></label>
            <input type="range" id="range-stk-y" min="-500" max="500" value="0">
        </div>

        <div class="form-group section-divider">
            <label for="input-copy">출처 표기</label>
            <input type="text" id="input-copy" value="변변찮은 창조주" placeholder="없을 시 공란">
        </div>
        
        <button class="btn-save" onclick="saveAsImage()">이미지 다운로드</button>
    </div>

    <div class="preview-container">
        <div id="capture-area">
            <div class="bg-blur-box" id="view-bg"></div>
            
            <div class="text-card" id="text-card-zone">
                <div class="card-title" id="view-title">제목</div>
                <div class="card-content" id="view-content"></div>
            </div>
            
            <div class="main-image-box">
                <span class="no-img-msg" id="no-img-txt">그림을 첨부해주세요.</span>
                <img id="view-image" src="" alt="그림">
            </div>

            <div class="sticker-box" id="sticker-zone">
                <img id="view-sticker" src="" alt="SD">
            </div>
            
            <div class="copyright-tag" id="view-copy">© 변변찮은 창조주</div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script>
        const inputTitle = document.getElementById('input-title');
        const inputText = document.getElementById('input-text');
        const selectFont = document.getElementById('select-font');
        const inputImage = document.getElementById('input-image');
        const inputSticker = document.getElementById('input-sticker'); 
        const inputCopy = document.getElementById('input-copy');
        
        const rangeZoom = document.getElementById('range-zoom');
        const rangeX = document.getElementById('range-x');
        const rangeY = document.getElementById('range-x-y');

        const rangeStkZoom = document.getElementById('range-stk-zoom');
        const rangeStkX = document.getElementById('range-stk-x');
        const rangeStky = document.getElementById('range-stk-y');
        
        const valZoom = document.getElementById('val-zoom');
        const valX = document.getElementById('val-x');
        const valY = document.getElementById('val-y');

        const valStkZoom = document.getElementById('val-stk-zoom');
        const valStkX = document.getElementById('val-stk-x');
        const valStkY = document.getElementById('val-stk-y');

        const viewTitle = document.getElementById('view-title');
        const viewContent = document.getElementById('view-content');
        const textCardZone = document.getElementById('text-card-zone');
        const viewImage = document.getElementById('view-image');
        const viewSticker = document.getElementById('view-sticker');
        const stickerZone = document.getElementById('sticker-zone');
        const viewBg = document.getElementById('view-bg');
        const viewCopy = document.getElementById('view-copy');
        const noImgTxt = document.getElementById('no-img-txt');

        let currentZoom = 1;
        let currentX = 0;
        let currentY = 0;

        let stkZoom = 1;
        let stkX = 0;
        let stkY = 0;

        function updateImageTransform() {
            viewImage.style.transform = `translate(calc(-50% + ${currentX}px), calc(-50% + ${currentY}px)) scale(${currentZoom})`;
        }

        function updateStickerTransform() {
            viewSticker.style.transform = `translate(${stkX}px, ${stkY}px) scale(${stkZoom})`;
        }

        function renderContent() {
            const lines = inputText.value.split('\n');
            let htmlResult = '';
            lines.forEach(line => {
                htmlResult += `<span class="text-line">${line}</span>`;
            });
            viewContent.innerHTML = htmlResult;
        }

        inputTitle.addEventListener('input', () => { viewTitle.textContent = inputTitle.value; });
        inputText.addEventListener('input', renderContent);
        
        inputCopy.addEventListener('input', () => {
            const val = inputCopy.value.trim();
            if (val === '') { viewCopy.textContent = ''; } 
            else { viewCopy.textContent = '© ' + val; }
        });

        selectFont.addEventListener('change', () => {
            const selectedFont = selectFont.value;
            textCardZone.style.fontFamily = selectedFont;
            viewTitle.style.fontFamily = selectedFont;
            viewContent.style.fontFamily = selectedFont;
        });

        rangeZoom.addEventListener('input', () => {
            currentZoom = rangeZoom.value / 100;
            valZoom.textContent = rangeZoom.value + '%';
            updateImageTransform();
        });
        rangeX.addEventListener('input', () => {
            currentX = rangeX.value;
            valX.textContent = rangeX.value + 'px';
            updateImageTransform();
        });
        rangeY.addEventListener('input', () => {
            currentY = rangeY.value;
            valY.textContent = rangeY.value + 'px';
            updateImageTransform();
        });

        rangeStkZoom.addEventListener('input', () => {
            stkZoom = rangeStkZoom.value / 100;
            valStkZoom.textContent = rangeStkZoom.value + '%';
            updateStickerTransform();
        });
        rangeStkX.addEventListener('input', () => {
            stkX = rangeStkX.value;
            valStkX.textContent = rangeStkX.value + 'px';
            updateStickerTransform();
        });
        rangeStky.addEventListener('input', () => {
            stkY = rangeStky.value;
            valStkY.textContent = rangeStky.value + 'px';
            updateStickerTransform();
        });

        inputImage.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    noImgTxt.style.display = 'none';
                    viewImage.style.display = 'block'; 
                    viewBg.style.display = 'block'; 
                    
                    viewImage.src = event.target.result;
                    viewBg.style.backgroundImage = `url('${event.target.result}')`;

                    currentZoom = 1; currentX = 0; currentY = 0;
                    rangeZoom.value = 100; rangeX.value = 0; rangeY.value = 0;
                    valZoom.textContent = '100%'; valX.textContent = '0px'; valY.textContent = '0px';
                    updateImageTransform();
                }
                reader.readAsDataURL(file);
            }
        });

        inputSticker.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    stickerZone.style.display = 'block';
                    viewSticker.src = event.target.result;

                    stkZoom = 1; stkX = 0; stkY = 0;
                    rangeStkZoom.value = 100; rangeStkX.value = 0; rangeStky.value = 0;
                    valStkZoom.textContent = '100%'; valStkX.textContent = '0px'; valStkY.textContent = '0px';
                    updateStickerTransform();
                }
                reader.readAsDataURL(file);
            }
        });

        viewTitle.textContent = inputTitle.value;
        renderContent();

        function saveAsImage() {
            const captureArea = document.getElementById('capture-area');
            html2canvas(captureArea, {
                useCORS: true,
                scale: 2, 
                logging: false
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = '글로그.png';
                link.href = canvas.toDataURL('image/png');
                link.click();
            }).catch(err => {
                alert('이미지 저장 중 오류가 발생했습니다.');
                console.error(err);
            });
        }
    </script>
</body>
</html>
